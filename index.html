<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StudyTracker">
<meta name="theme-color" content="#6c5ce7">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Study Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--surface3:#242432;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#eeeef5;--muted:#7878a0;--muted2:#5a5a80;
  --accent:#6c5ce7;--accent2:#a29bfe;--accent-bg:rgba(108,92,231,0.15);
  --green:#00b894;--green2:#55efc4;--green-bg:rgba(0,184,148,0.12);
  --amber:#fdcb6e;--amber-bg:rgba(253,203,110,0.12);
  --red:#e84393;--red2:#fd79a8;--red-bg:rgba(232,67,147,0.12);
  --blue:#0984e3;--blue2:#74b9ff;--blue-bg:rgba(9,132,227,0.12);
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Outfit',sans-serif;color:var(--text);font-size:15px;display:flex;flex-direction:column}

/* ── Top bar ── */
.topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:calc(var(--safe-top) + 12px) 16px 12px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;position:sticky;top:0;z-index:50
}
.topbar-title{font-size:18px;font-weight:700;letter-spacing:-.5px;display:flex;align-items:center;gap:8px}
.topbar-icon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}

/* ── Scroll area ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 calc(var(--safe-bottom) + 80px)}

/* ── Bottom nav ── */
.bottom-nav{
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;padding:8px 0 calc(var(--safe-bottom) + 8px);
  flex-shrink:0;position:sticky;bottom:0;z-index:50
}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border:none;background:none;color:var(--muted);font-size:10px;font-family:'Outfit',sans-serif;font-weight:500;cursor:pointer;transition:color .15s;letter-spacing:.3px}
.nav-tab.active{color:var(--accent2)}
.nav-tab-icon{font-size:20px;line-height:1}

/* ── Stats strip ── */
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px 14px 0}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 10px;text-align:center;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac,var(--accent))}
.stat-val{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-1px}
.stat-lbl{font-size:9px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-top:3px}

/* ── Section header ── */
.section-header{display:flex;align-items:center;justify-content:space-between;padding:16px 14px 8px}
.section-title{font-size:12px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}

/* ── Filter chips ── */
.chips{display:flex;gap:8px;padding:0 14px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;font-family:'Outfit',sans-serif;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s}
.chip.active{background:var(--accent-bg);border-color:rgba(108,92,231,.4);color:var(--accent2)}

/* ── Subject cards ── */
.cards{padding:0 14px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;transition:transform .1s,border-color .15s;active:scale(.98)}
.card:active{transform:scale(.98)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-title{font-size:15px;font-weight:600;letter-spacing:-.2px;flex:1;min-width:0}
.card-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.badge-high{background:var(--red-bg);color:var(--red2)}
.badge-medium{background:var(--amber-bg);color:var(--amber)}
.badge-low{background:var(--green-bg);color:var(--green)}
.badge-date{background:var(--blue-bg);color:var(--blue2);text-transform:none;font-size:11px;font-weight:500}
.badge-urgent{background:rgba(232,67,147,.25);color:var(--red2)}
.status-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid transparent}
.sp-not{background:rgba(120,120,160,.1);color:var(--muted);border-color:rgba(120,120,160,.2)}
.sp-prog{background:var(--blue-bg);color:var(--blue2);border-color:rgba(9,132,227,.25)}
.sp-done{background:var(--green-bg);color:var(--green2);border-color:rgba(0,184,148,.25)}
.card-notes{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:10px}
.card-links{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.link-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:4px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--accent2);text-decoration:none}

/* ── Progress ── */
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.prog-lbl{font-size:11px;color:var(--muted);font-weight:500}
.prog-pct{font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--accent2);min-width:32px;text-align:right}
.pbar{flex:1;height:5px;background:var(--surface3);border-radius:10px;overflow:hidden}
.pbar-fill{height:100%;border-radius:10px;background:var(--accent);transition:width .3s}
.pbar-fill.done{background:var(--green)}
.slider{width:100%;-webkit-appearance:none;appearance:none;height:4px;border-radius:10px;background:var(--surface3);outline:none;cursor:pointer;margin-top:6px}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}

/* ── Card actions ── */
.card-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.card-btn{flex:1;padding:8px;border-radius:var(--radius-xs);border:1px solid var(--border2);background:var(--surface2);color:var(--muted);font-size:12px;font-family:'Outfit',sans-serif;font-weight:500;cursor:pointer;text-align:center}
.card-btn.danger{color:var(--red2);border-color:rgba(232,67,147,.2);background:var(--red-bg)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;font-size:14px;font-family:'Outfit',sans-serif;font-weight:600;transition:all .15s;width:100%}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:active{background:#5a4cd6}
.btn-ghost{background:none;border-color:transparent;color:var(--muted)}

/* ── FAB ── */
.fab{position:fixed;right:18px;bottom:calc(var(--safe-bottom) + 76px);width:54px;height:54px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(108,92,231,.5);cursor:pointer;z-index:40;transition:transform .15s}
.fab:active{transform:scale(.92)}

/* ── Bottom sheet modal ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-overlay.open{opacity:1;pointer-events:all}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:0 16px calc(var(--safe-bottom) + 20px);max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sheet-overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--surface3);border-radius:2px;margin:12px auto 16px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:20px;letter-spacing:-.3px}

/* ── Form fields ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 14px;color:var(--text);font-size:15px;font-family:'Outfit',sans-serif;outline:none;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:80px;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── Setup screen ── */
.setup-screen{padding:24px 20px;display:flex;flex-direction:column;gap:16px}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.setup-step{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.setup-num{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.setup-text{font-size:13px;line-height:1.6;color:var(--muted)}
.setup-text strong{color:var(--text)}
.setup-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 14px;color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;outline:none;margin-top:8px;word-break:break-all}

/* ── Calendar ── */
.cal-wrap{padding:14px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month{font-size:16px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-name{text-align:center;font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);padding:4px 0}
.cal-cell{min-height:52px;border-radius:var(--radius-xs);padding:4px;background:var(--surface)}
.cal-cell.today{background:var(--accent-bg);outline:1px solid var(--accent)}
.cal-cell.other{opacity:.3}
.cal-date{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:2px}
.cal-cell.today .cal-date{color:var(--accent2)}
.cal-evt{font-size:9px;font-weight:600;padding:1px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-evt.high{background:var(--red-bg);color:var(--red2)}
.cal-evt.medium{background:var(--amber-bg);color:var(--amber)}
.cal-evt.low{background:var(--green-bg);color:var(--green)}

/* ── Gantt ── */
.gantt-wrap{padding:14px;overflow-x:auto}
.gantt-row{display:flex;margin-bottom:8px;align-items:center;gap:8px}
.gantt-lbl{width:110px;flex-shrink:0}
.gantt-lbl-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-lbl-sub{font-size:10px;color:var(--muted);margin-top:1px}
.gantt-track{flex:1;height:28px;background:var(--surface);border-radius:6px;position:relative;overflow:hidden;min-width:180px}
.gantt-bar-bg{position:absolute;top:4px;height:20px;border-radius:4px;opacity:.3}
.gantt-bar-fill{position:absolute;top:4px;height:20px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:9px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden}
.gantt-bar-bg.high,.gantt-bar-fill.high{background:rgba(232,67,147,.8)}
.gantt-bar-bg.medium,.gantt-bar-fill.medium{background:rgba(253,203,110,.8)}
.gantt-bar-fill.medium{color:#1a1a00}
.gantt-bar-bg.low,.gantt-bar-fill.low{background:rgba(0,184,148,.8)}
.gantt-today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--accent2)}

/* ── Empty / loading ── */
.empty{text-align:center;padding:3rem 2rem;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:13px;line-height:1.6}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:12px;color:var(--muted);font-size:13px}
.spinner{width:26px;height:26px;border:2px solid var(--surface3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease}

/* ── Toast ── */
.toast-wrap{position:fixed;top:calc(var(--safe-top) + 60px);left:50%;transform:translateX(-50%);z-index:200;pointer-events:none}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:10px 18px;font-size:13px;font-weight:500;white-space:nowrap;animation:fadeIn .2s ease}

/* ── Sync indicator ── */
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s}
.sync-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.sync-dot.err{background:var(--red)}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-title">
    <div class="topbar-icon">📚</div>
    Study Tracker
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="sync-dot" id="sync-dot" title="Sync status"></div>
    <button class="btn-ghost" style="border:none;background:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px" onclick="openSettings()">⚙️</button>
  </div>
</div>

<!-- Scroll area -->
<div class="scroll" id="scroll-area">
  <div class="loading"><div class="spinner"></div>Loading...</div>
</div>

<!-- Bottom nav -->
<div class="bottom-nav">
  <button class="nav-tab active" onclick="switchTab('dashboard',this)">
    <span class="nav-tab-icon">◼</span>Dashboard
  </button>
  <button class="nav-tab" onclick="switchTab('calendar',this)">
    <span class="nav-tab-icon">📅</span>Calendar
  </button>
  <button class="nav-tab" onclick="switchTab('gantt',this)">
    <span class="nav-tab-icon">📊</span>Gantt
  </button>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="openAddSheet()">+</button>

<!-- Bottom sheet modal -->
<div class="sheet-overlay" id="sheet-overlay" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div id="sheet-content"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ══════════════════════════════════════════════════════════════════════
// CONFIG — stored in localStorage
// ══════════════════════════════════════════════════════════════════════
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file';
let cfg = JSON.parse(localStorage.getItem('st-config') || '{}');
// cfg = { apiKey, clientId, sheetId }

let subjects   = [];
let currentTab = 'dashboard';
let filterMode = 'all';
let sortBy     = 'priority';
let calYear, calMonth;
let gapiReady  = false;
let gisReady   = false;
let tokenClient;

// ── Helpers ───────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function daysUntil(d) { if(!d) return null; return Math.ceil((new Date(d)-new Date())/86400000); }
function fmtDate(d) { if(!d) return ''; try{ return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }catch{ return d; } }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function safeHost(u) { try{ return new URL(u).hostname; }catch{ return u; } }

function toast(msg, type='') {
  const el = document.getElementById('toast-wrap');
  const color = type==='ok'?'var(--green2)':type==='err'?'var(--red2)':'var(--text)';
  el.innerHTML = `<div class="toast" style="color:${color}">${msg}</div>`;
  setTimeout(() => el.innerHTML='', 2500);
}

function setSyncStatus(s) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot ' + s;
}

function statusPill(status) {
  const map = {
    'not started': ['sp-not','○ Not started'],
    'in progress': ['sp-prog','◑ In progress'],
    'finished':    ['sp-done','● Finished'],
  };
  const [cls,lbl] = map[status]||map['not started'];
  return `<span class="status-pill ${cls}">${lbl}</span>`;
}

// ── Service worker ────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// ══════════════════════════════════════════════════════════════════════
// GOOGLE API
// ══════════════════════════════════════════════════════════════════════
function loadGoogleAPIs() {
  return new Promise(resolve => {
    const s1 = document.createElement('script');
    s1.src = 'https://apis.google.com/js/api.js';
    s1.onload = () => {
      gapi.load('client', async () => {
        await gapi.client.init({
          apiKey: cfg.apiKey,
          discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
        });
        gapiReady = true;
        if (gisReady) resolve();
      });
    };
    document.head.appendChild(s1);

    const s2 = document.createElement('script');
    s2.src = 'https://accounts.google.com/gsi/client';
    s2.onload = () => {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: cfg.clientId,
        scope: SCOPES,
        callback: async (resp) => {
          if (resp.error) { setSyncStatus('err'); toast('Auth failed','err'); return; }
          setSyncStatus('syncing');
          await ensureSheet();
          await loadSubjects();
          renderTab();
        },
      });
      gisReady = true;
      if (gapiReady) resolve();
    };
    document.head.appendChild(s2);
  });
}

function signIn() {
  if (gapi.client.getToken() === null) {
    tokenClient.requestAccessToken({ prompt: 'consent' });
  } else {
    tokenClient.requestAccessToken({ prompt: '' });
  }
}

// ── Sheet operations ──────────────────────────────────────────────────
async function ensureSheet() {
  if (cfg.sheetId) return;
  // Create a new sheet
  const res = await gapi.client.sheets.spreadsheets.create({
    resource: {
      properties: { title: 'Study Tracker Data' },
      sheets: [{ properties: { title: 'Subjects' } }]
    }
  });
  cfg.sheetId = res.result.spreadsheetId;
  localStorage.setItem('st-config', JSON.stringify(cfg));
  // Write header
  await gapi.client.sheets.spreadsheets.values.update({
    spreadsheetId: cfg.sheetId,
    range: 'Subjects!A1',
    valueInputOption: 'RAW',
    resource: { values: [['id','name','priority','examDate','progress','status','notes','links','createdAt']] }
  });
}

function rowToSubject(row) {
  while (row.length < 9) row.push('');
  return {
    id:        row[0]||'',
    name:      row[1]||'',
    priority:  row[2]||'medium',
    examDate:  row[3]||'',
    progress:  parseInt(row[4])||0,
    status:    row[5]||'not started',
    notes:     row[6]||'',
    links:     (row[7]||'').split('|').map(l=>l.trim()).filter(Boolean),
    createdAt: row[8]||'',
  };
}

function subjectToRow(s) {
  return [s.id,s.name,s.priority,s.examDate,String(s.progress||0),s.status,s.notes||'',(s.links||[]).join('|'),s.createdAt||''];
}

async function loadSubjects() {
  setSyncStatus('syncing');
  try {
    const res = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId: cfg.sheetId,
      range: 'Subjects!A2:I',
    });
    subjects = (res.result.values||[]).filter(r=>r[0]).map(rowToSubject);
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('err'); toast('Failed to load data','err');
  }
}

async function writeAllSubjects() {
  setSyncStatus('syncing');
  try {
    await gapi.client.sheets.spreadsheets.values.clear({
      spreadsheetId: cfg.sheetId, range: 'Subjects!A2:I'
    });
    if (subjects.length) {
      await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId: cfg.sheetId,
        range: 'Subjects!A2',
        valueInputOption: 'RAW',
        resource: { values: subjects.map(subjectToRow) }
      });
    }
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('err'); toast('Sync failed','err');
  }
}

async function appendSubject(s) {
  setSyncStatus('syncing');
  try {
    await gapi.client.sheets.spreadsheets.values.append({
      spreadsheetId: cfg.sheetId,
      range: 'Subjects!A2',
      valueInputOption: 'RAW',
      insertDataOption: 'INSERT_ROWS',
      resource: { values: [subjectToRow(s)] }
    });
    subjects.push(s);
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('err'); toast('Sync failed','err');
  }
}

// ══════════════════════════════════════════════════════════════════════
// FILTERS / SORT
// ══════════════════════════════════════════════════════════════════════
function setFilter(f) { filterMode=f; renderDashboard(); }
function getFiltered() {
  let list = [...subjects];
  if (['not started','in progress','finished'].includes(filterMode)) list=list.filter(s=>s.status===filterMode);
  else if (filterMode==='high')     list=list.filter(s=>s.priority==='high');
  else if (filterMode==='medium')   list=list.filter(s=>s.priority==='medium');
  else if (filterMode==='low')      list=list.filter(s=>s.priority==='low');
  else if (filterMode==='due-soon') list=list.filter(s=>{const d=daysUntil(s.examDate);return d!==null&&d<=7&&d>=0;});
  const po={high:0,medium:1,low:2};
  if (sortBy==='priority') list.sort((a,b)=>po[a.priority]-po[b.priority]||(daysUntil(a.examDate)||9999)-(daysUntil(b.examDate)||9999));
  else if (sortBy==='progress') list.sort((a,b)=>b.progress-a.progress);
  else if (sortBy==='date') list.sort((a,b)=>(daysUntil(a.examDate)||9999)-(daysUntil(b.examDate)||9999));
  return list;
}

// TAB SWITCHING
// ══════════════════════════════════════════════════════════════════════
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('fab').style.display = tab==='dashboard' ? 'flex' : 'none';
  renderTab();
}

function renderTab() {
  if (currentTab==='dashboard') renderDashboard();
  else if (currentTab==='calendar') renderCalendar();
  else if (currentTab==='gantt') renderGantt();
}

// ══════════════════════════════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════════════════════════════
function renderDashboard() {
  const total=subjects.length;
  const inProg=subjects.filter(s=>s.status==='in progress').length;
  const done=subjects.filter(s=>s.status==='finished').length;
  const soon=subjects.filter(s=>{const d=daysUntil(s.examDate);return d!==null&&d<=7&&d>=0;}).length;
  const list=getFiltered();

  const chips = [
    ['all','All'],['not started','Not started'],['in progress','In progress'],
    ['finished','Finished'],['high','🔴 High'],['medium','🟡 Medium'],
    ['low','🟢 Low'],['due-soon','Due soon'],
  ];

  const cardsHtml = list.length ? list.map(cardHtml).join('') : `
    <div class="empty">
      <div class="empty-icon">📖</div>
      <div class="empty-title">No subjects yet</div>
      <div class="empty-sub">Tap + to add your first subject</div>
    </div>`;

  document.getElementById('scroll-area').innerHTML = `
    <div class="stats-strip">
      <div class="stat" style="--ac:var(--muted)"><div class="stat-val">${total}</div><div class="stat-lbl">Total</div></div>
      <div class="stat" style="--ac:var(--blue2)"><div class="stat-val" style="color:var(--blue2)">${inProg}</div><div class="stat-lbl">Active</div></div>
      <div class="stat" style="--ac:var(--green2)"><div class="stat-val" style="color:var(--green2)">${done}</div><div class="stat-lbl">Done</div></div>
      <div class="stat" style="--ac:var(--amber)"><div class="stat-val" style="color:var(--amber)">${soon}</div><div class="stat-lbl">Soon</div></div>
    </div>
    <div class="section-header">
      <span class="section-title">Subjects</span>
      <select style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--muted);font-size:11px;font-family:'Outfit',sans-serif;outline:none" onchange="sortBy=this.value;renderDashboard()">
        <option value="priority" ${sortBy==='priority'?'selected':''}>By priority</option>
        <option value="date" ${sortBy==='date'?'selected':''}>By date</option>
        <option value="progress" ${sortBy==='progress'?'selected':''}>By progress</option>
      </select>
    </div>
    <div class="chips">
      ${chips.map(([v,l])=>`<button class="chip ${filterMode===v?'active':''}" onclick="setFilter('${v}')">${l}</button>`).join('')}
    </div>
    <div class="cards">${cardsHtml}</div>`;
}

function cardHtml(s) {
  const days=daysUntil(s.examDate), pct=s.progress, complete=pct===100;
  const urgent=days!==null&&days<=3&&days>=0;
  const dateLabel=days!==null?`${fmtDate(s.examDate)} · ${days===0?'Today!':days<0?Math.abs(days)+'d ago':days+'d'}`:fmtDate(s.examDate);
  const links=(s.links||[]).filter(l=>l.startsWith('http'));
  return `<div class="card fade-in">
    <div class="card-header">
      <div class="card-title">${esc(s.name)}</div>
    </div>
    <div class="card-badges">
      <span class="badge badge-${s.priority}">${s.priority}</span>
      ${statusPill(s.status)}
      ${s.examDate?`<span class="badge ${urgent?'badge-urgent':'badge-date'}">${dateLabel}</span>`:''}
    </div>
    ${s.notes?`<div class="card-notes">${esc(s.notes)}</div>`:''}
    ${links.length?`<div class="card-links">${links.map(l=>`<a href="${l}" class="link-chip" target="_blank">↗ ${safeHost(l)}</a>`).join('')}</div>`:''}
    <div class="prog-row">
      <span class="prog-lbl">Progress</span>
      <div class="pbar" style="flex:1"><div class="pbar-fill ${complete?'done':''}" style="width:${pct}%" id="fill-${s.id}"></div></div>
      <span class="prog-pct" id="pct-${s.id}">${pct}%</span>
    </div>
    <input type="range" min="0" max="100" value="${pct}" step="1" class="slider"
      oninput="liveProgress('${s.id}',this.value)"
      onchange="saveProgress('${s.id}',this.value)">
    <div class="card-actions">
      <button class="card-btn" onclick="openEditSheet('${s.id}')">Edit</button>
      <button class="card-btn danger" onclick="deleteSubject('${s.id}')">Delete</button>
    </div>
  </div>`;
}

function liveProgress(id,val) {
  const f=document.getElementById('fill-'+id), p=document.getElementById('pct-'+id);
  if(f){f.style.width=val+'%';f.className='pbar-fill'+(parseInt(val)===100?' done':'');}
  if(p) p.textContent=val+'%';
}

async function saveProgress(id,val) {
  const s=subjects.find(x=>x.id===id); if(!s) return;
  s.progress=parseInt(val);
  await writeAllSubjects();
  toast('Saved','ok');
}

async function deleteSubject(id) {
  if(!confirm('Delete this subject?')) return;
  subjects=subjects.filter(x=>x.id!==id);
  await writeAllSubjects();
  renderDashboard(); toast('Deleted','ok');
}

// ══════════════════════════════════════════════════════════════════════
// ADD / EDIT SHEET
// ══════════════════════════════════════════════════════════════════════
function formHtml(s) {
  const sts=['not started','in progress','finished'];
  return `
    <div class="field"><label>Subject name</label>
      <input id="f-name" placeholder="e.g. Machine Learning" value="${esc(s?.name||'')}">
    </div>
    <div class="field-row">
      <div class="field"><label>Priority</label>
        <select id="f-priority">
          <option value="high" ${s?.priority==='high'?'selected':''}>🔴 High</option>
          <option value="medium" ${(!s||s?.priority==='medium')?'selected':''}>🟡 Medium</option>
          <option value="low" ${s?.priority==='low'?'selected':''}>🟢 Low</option>
        </select>
      </div>
      <div class="field"><label>Status</label>
        <select id="f-status">
          ${sts.map(st=>`<option value="${st}" ${(s?.status||'not started')===st?'selected':''}>${st.charAt(0).toUpperCase()+st.slice(1)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="field"><label>Exam date</label>
      <input type="date" id="f-date" value="${s?.examDate||''}">
    </div>
    <div class="field"><label>Progress — <span id="prog-disp">${s?.progress||0}%</span></label>
      <input type="range" min="0" max="100" value="${s?.progress||0}" step="1" class="slider"
        oninput="document.getElementById('prog-disp').textContent=this.value+'%'" id="f-progress">
    </div>
    <div class="field"><label>Notes</label>
      <textarea id="f-notes" placeholder="Key topics...">${esc(s?.notes||'')}</textarea>
    </div>
    <div class="field"><label>Resource links (one per line)</label>
      <textarea id="f-links" placeholder="https://...">${(s?.links||[]).join('\n')}</textarea>
    </div>`;
}

function openAddSheet() {
  document.getElementById('sheet-content').innerHTML = `
    <div class="sheet-title">Add subject</div>
    ${formHtml(null)}
    <button class="btn btn-primary" onclick="submitSubject(null)">Save subject</button>`;
  openSheet();
}

function openEditSheet(id) {
  const s=subjects.find(x=>x.id===id); if(!s) return;
  document.getElementById('sheet-content').innerHTML = `
    <div class="sheet-title">Edit — ${esc(s.name)}</div>
    ${formHtml(s)}
    <button class="btn btn-primary" onclick="submitSubject('${id}')">Save changes</button>`;
  openSheet();
}

function openSheet() {
  document.getElementById('sheet-overlay').classList.add('open');
}
function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
}

async function submitSubject(id) {
  const name=document.getElementById('f-name').value.trim();
  if(!name){toast('Please enter a subject name','err');return;}
  const links=document.getElementById('f-links').value.split('\n').map(l=>l.trim()).filter(l=>l.startsWith('http'));
  const data={
    id:id||(Date.now().toString(36)+Math.random().toString(36).slice(2,4)),
    name, priority:document.getElementById('f-priority').value,
    status:document.getElementById('f-status').value,
    examDate:document.getElementById('f-date').value,
    progress:parseInt(document.getElementById('f-progress').value),
    notes:document.getElementById('f-notes').value.trim(),
    links, createdAt:id?(subjects.find(x=>x.id===id)?.createdAt||new Date().toISOString()):new Date().toISOString()
  };
  closeSheet();
  if(id) {
    const i=subjects.findIndex(x=>x.id===id);
    subjects[i]=data;
    await writeAllSubjects();
    toast('Updated','ok');
  } else {
    await appendSubject(data);
    toast('Added','ok');
  }
  renderDashboard();
}

// ══════════════════════════════════════════════════════════════════════
// CALENDAR
// ══════════════════════════════════════════════════════════════════════
function renderCalendar() {
  const now=new Date();
  if(!calYear) calYear=now.getFullYear();
  if(calMonth===undefined) calMonth=now.getMonth();
  const firstDay=new Date(calYear,calMonth,1);
  const totalDays=new Date(calYear,calMonth+1,0).getDate();
  const startDow=firstDay.getDay();
  const today=now.toISOString().slice(0,10);
  const examMap={};
  subjects.forEach(s=>{ if(s.examDate){if(!examMap[s.examDate])examMap[s.examDate]=[];examMap[s.examDate].push(s);} });
  let cells='', dayCount=1;
  const totalCells=Math.ceil((startDow+totalDays)/7)*7;
  for(let i=0;i<totalCells;i++){
    let cellDate,dateStr,other=false;
    if(i<startDow){const d=new Date(calYear,calMonth,-(startDow-i-1));cellDate=d.getDate();dateStr=d.toISOString().slice(0,10);other=true;}
    else if(dayCount<=totalDays){cellDate=dayCount;dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(dayCount).padStart(2,'0')}`;dayCount++;}
    else{const d=new Date(calYear,calMonth+1,dayCount-totalDays);cellDate=d.getDate();dateStr=d.toISOString().slice(0,10);other=true;dayCount++;}
    const isToday=dateStr===today;
    const evts=(examMap[dateStr]||[]).map(s=>`<div class="cal-evt ${s.priority}">${esc(s.name)}</div>`).join('');
    cells+=`<div class="cal-cell ${other?'other':''} ${isToday?'today':''}"><div class="cal-date">${cellDate}</div>${evts}</div>`;
  }
  const monthName=firstDay.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  document.getElementById('scroll-area').innerHTML=`
    <div class="cal-wrap">
      <div class="cal-nav">
        <button class="btn-ghost" style="border:none;background:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px" onclick="calNav(-1)">‹</button>
        <div class="cal-month">${monthName}</div>
        <button class="btn-ghost" style="border:none;background:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px" onclick="calNav(1)">›</button>
      </div>
      <div class="cal-grid">
        ${['S','M','T','W','T','F','S'].map(d=>`<div class="cal-day-name">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>`;
}
function calNav(dir){calMonth+=dir;if(calMonth<0){calMonth=11;calYear--;}else if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}

// ══════════════════════════════════════════════════════════════════════
// GANTT
// ══════════════════════════════════════════════════════════════════════
function renderGantt() {
  const withDates=subjects.filter(s=>s.examDate);
  if(!withDates.length){
    document.getElementById('scroll-area').innerHTML=`<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">No exam dates set</div><div class="empty-sub">Add exam dates to see the Gantt chart</div></div>`;
    return;
  }
  const today=new Date();today.setHours(0,0,0,0);
  const maxDate=new Date(Math.max(...withDates.map(s=>new Date(s.examDate))));
  maxDate.setDate(maxDate.getDate()+7);
  const totalDays=Math.ceil((maxDate-today)/86400000);
  const rows=withDates.map(s=>{
    const end=new Date(s.examDate);end.setHours(0,0,0,0);
    const dLeft=Math.ceil((end-today)/86400000);
    const past=dLeft<0;
    const barW=past?1:Math.min(dLeft/totalDays*100,100);
    const progW=barW*(s.progress/100);
    const st={'not started':'○','in progress':'◑','finished':'●'}[s.status]||'○';
    return `<div class="gantt-row">
      <div class="gantt-lbl">
        <div class="gantt-lbl-name">${st} ${esc(s.name)}</div>
        <div class="gantt-lbl-sub">${past?'Past':dLeft+'d'} · ${s.progress}%</div>
      </div>
      <div class="gantt-track">
        <div class="gantt-bar-bg ${s.priority}" style="left:0;width:${barW}%"></div>
        <div class="gantt-bar-fill ${s.priority}" style="left:0;width:${progW}%">${s.progress>10?s.progress+'%':''}</div>
        <div class="gantt-today-line" style="left:0"></div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('scroll-area').innerHTML=`
    <div class="gantt-wrap">
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px">Today → ${fmtDate(maxDate.toISOString().slice(0,10))}</div>
      ${rows}
      <div style="display:flex;gap:14px;margin-top:14px;font-size:11px;color:var(--muted);flex-wrap:wrap">
        <span>🔴 High</span><span>🟡 Medium</span><span>🟢 Low</span>
        <span>○ Not started · ◑ In progress · ● Finished</span>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════
async function initApp() {
  if (!cfg.apiKey || !cfg.clientId) {
    showSetupScreen(); return;
  }
  document.getElementById('fab').style.display = 'flex';
  document.getElementById('scroll-area').innerHTML = '<div class="loading"><div class="spinner"></div>Connecting to Google...</div>';
  await loadGoogleAPIs();
  signIn();
}

// Start
initApp();
</script>
