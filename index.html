<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StudyTracker">
<meta name="theme-color" content="#6c5ce7">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Study Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--surface3:#242432;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#eeeef5;--muted:#7878a0;--muted2:#5a5a80;
  --accent:#6c5ce7;--accent2:#a29bfe;--accent-bg:rgba(108,92,231,0.15);
  --green:#00b894;--green2:#55efc4;--green-bg:rgba(0,184,148,0.12);
  --amber:#fdcb6e;--amber-bg:rgba(253,203,110,0.12);
  --red:#e84393;--red2:#fd79a8;--red-bg:rgba(232,67,147,0.12);
  --blue:#0984e3;--blue2:#74b9ff;--blue-bg:rgba(9,132,227,0.12);
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Outfit',sans-serif;color:var(--text);font-size:15px;display:flex;flex-direction:column}

/* ── Login screen ── */
.login-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:20px;overflow-y:auto}
.login-logo{width:72px;height:72px;background:var(--accent);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:4px;box-shadow:0 8px 32px rgba(108,92,231,.4)}
.login-title{font-size:26px;font-weight:700;letter-spacing:-.5px;text-align:center}
.login-sub{font-size:14px;color:var(--muted);text-align:center;margin-top:-8px}
.login-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;display:flex;flex-direction:column;gap:14px}
.login-tab-row{display:flex;background:var(--surface2);border-radius:var(--radius-xs);padding:3px;gap:3px;margin-bottom:4px}
.login-tab{flex:1;padding:8px;border:none;background:none;color:var(--muted);font-size:13px;font-family:'Outfit',sans-serif;font-weight:500;cursor:pointer;border-radius:var(--radius-xs);transition:all .15s}
.login-tab.active{background:var(--accent);color:#fff}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:13px 14px;color:var(--text);font-size:15px;font-family:'Outfit',sans-serif;outline:none}
.inp:focus{border-color:var(--accent)}
.btn-primary{display:flex;align-items:center;justify-content:center;gap:6px;padding:13px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;font-size:15px;font-family:'Outfit',sans-serif;font-weight:600;cursor:pointer;width:100%;transition:all .15s}
.btn-primary:active{background:#5a4cd6}
.err-msg{font-size:12px;color:var(--red2);text-align:center;min-height:16px}

/* ── Top bar ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 12px) 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-icon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.topbar-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
.topbar-user{font-size:11px;color:var(--muted);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s}
.sync-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.sync-dot.err{background:var(--red)}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s ease-in-out infinite}
.icon-btn{border:none;background:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;line-height:1}

/* ── Scroll + nav ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 calc(var(--safe-bottom) + 80px)}
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(var(--safe-bottom) + 8px);flex-shrink:0;z-index:50}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border:none;background:none;color:var(--muted);font-size:10px;font-family:'Outfit',sans-serif;font-weight:500;cursor:pointer;transition:color .15s;letter-spacing:.3px}
.nav-tab.active{color:var(--accent2)}
.nav-tab-icon{font-size:20px;line-height:1}

/* ── Stats ── */
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px 14px 0}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 10px;text-align:center;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac,var(--accent))}
.stat-val{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-1px}
.stat-lbl{font-size:9px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-top:3px}

/* ── Section header ── */
.section-header{display:flex;align-items:center;justify-content:space-between;padding:16px 14px 8px}
.section-title{font-size:12px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}

/* ── Chips ── */
.chips{display:flex;gap:8px;padding:0 14px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;font-family:'Outfit',sans-serif;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s}
.chip.active{background:var(--accent-bg);border-color:rgba(108,92,231,.4);color:var(--accent2)}

/* ── Cards ── */
.cards{padding:0 14px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;transition:transform .1s,border-color .15s}
.card:active{transform:scale(.98)}
.card-title{font-size:15px;font-weight:600;letter-spacing:-.2px;margin-bottom:8px}
.card-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.badge-high{background:var(--red-bg);color:var(--red2)}
.badge-medium{background:var(--amber-bg);color:var(--amber)}
.badge-low{background:var(--green-bg);color:var(--green)}
.badge-date{background:var(--blue-bg);color:var(--blue2);text-transform:none;font-size:11px;font-weight:500}
.badge-start{background:var(--green-bg);color:var(--green2);text-transform:none;font-size:11px;font-weight:500}
.badge-urgent{background:rgba(232,67,147,.25);color:var(--red2)}
.status-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid transparent}
.sp-not{background:rgba(120,120,160,.1);color:var(--muted);border-color:rgba(120,120,160,.2)}
.sp-prog{background:var(--blue-bg);color:var(--blue2);border-color:rgba(9,132,227,.25)}
.sp-done{background:var(--green-bg);color:var(--green2);border-color:rgba(0,184,148,.25)}
.card-notes{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:10px}
.card-links{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.link-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:4px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--accent2);text-decoration:none}
.date-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;font-size:12px;color:var(--muted);align-items:center}
.date-sep{color:var(--muted2);font-size:10px}

/* ── Progress ── */
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.prog-lbl{font-size:11px;color:var(--muted);font-weight:500}
.prog-pct{font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--accent2);min-width:32px;text-align:right}
.pbar{flex:1;height:5px;background:var(--surface3);border-radius:10px;overflow:hidden}
.pbar-fill{height:100%;border-radius:10px;background:var(--accent);transition:width .3s}
.pbar-fill.done{background:var(--green)}
.slider{width:100%;-webkit-appearance:none;appearance:none;height:4px;border-radius:10px;background:var(--surface3);outline:none;cursor:pointer;margin-top:6px}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
.card-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.card-btn{flex:1;padding:8px;border-radius:var(--radius-xs);border:1px solid var(--border2);background:var(--surface2);color:var(--muted);font-size:12px;font-family:'Outfit',sans-serif;font-weight:500;cursor:pointer;text-align:center}
.card-btn.danger{color:var(--red2);border-color:rgba(232,67,147,.2);background:var(--red-bg)}

/* ── FAB ── */
.fab{position:fixed;right:18px;bottom:calc(var(--safe-bottom) + 76px);width:54px;height:54px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(108,92,231,.5);cursor:pointer;z-index:40;transition:transform .15s}
.fab:active{transform:scale(.92)}

/* ── Sheet modal ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-overlay.open{opacity:1;pointer-events:all}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:0 16px calc(var(--safe-bottom) + 24px);max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sheet-overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--surface3);border-radius:2px;margin:12px auto 16px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:20px;letter-spacing:-.3px}

/* ── Form ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 14px;color:var(--text);font-size:15px;font-family:'Outfit',sans-serif;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:80px;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:13px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:14px;font-family:'Outfit',sans-serif;font-weight:600;cursor:pointer;width:100%;margin-bottom:8px}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── Calendar ── */
.cal-wrap{padding:14px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month{font-size:16px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-name{text-align:center;font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);padding:4px 0}
.cal-cell{min-height:60px;border-radius:var(--radius-xs);padding:4px;background:var(--surface)}
.cal-cell.today{background:var(--accent-bg);outline:1px solid var(--accent)}
.cal-cell.other{opacity:.3}
.cal-date{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:2px}
.cal-cell.today .cal-date{color:var(--accent2)}
.cal-evt{font-size:9px;font-weight:600;padding:1px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-evt.exam-high{background:var(--red-bg);color:var(--red2)}
.cal-evt.exam-medium{background:var(--amber-bg);color:var(--amber)}
.cal-evt.exam-low{background:var(--green-bg);color:var(--green)}
.cal-evt.start-event{background:var(--green-bg);color:var(--green2);opacity:.8}

/* ── Gantt ── */
.gantt-wrap{padding:14px;overflow-x:auto}
.gantt-row{display:flex;margin-bottom:10px;align-items:center;gap:8px}
.gantt-lbl{width:110px;flex-shrink:0}
.gantt-lbl-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-lbl-sub{font-size:10px;color:var(--muted);margin-top:1px}
.gantt-track{flex:1;height:32px;background:var(--surface2);border-radius:6px;position:relative;overflow:hidden;min-width:200px}
.gantt-bg{position:absolute;top:5px;height:22px;border-radius:4px;opacity:.25}
.gantt-fill{position:absolute;top:5px;height:22px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:9px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden}
.gantt-bg.high,.gantt-fill.high{background:rgba(232,67,147,.9)}
.gantt-bg.medium,.gantt-fill.medium{background:rgba(253,203,110,.9)}
.gantt-fill.medium{color:#2a1a00}
.gantt-bg.low,.gantt-fill.low{background:rgba(0,184,148,.9)}
.gantt-today{position:absolute;top:0;bottom:0;width:2px;background:var(--accent2);z-index:2}
.gantt-ruler{display:flex;margin-left:118px;margin-bottom:4px;position:relative;min-width:200px}
.gantt-ruler-lbl{position:absolute;font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;transform:translateX(-50%)}

/* ── Setup screen ── */
.setup-screen{padding:24px 16px;display:flex;flex-direction:column;gap:14px}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.setup-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
.setup-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.setup-text{font-size:13px;line-height:1.6;color:var(--muted)}
.setup-text strong{color:var(--text)}
.mono-inp{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:11px 12px;color:var(--text);font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;margin-top:6px}
.mono-inp:focus{border-color:var(--accent)}

/* ── Misc ── */
.empty{text-align:center;padding:3rem 2rem;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:13px;line-height:1.6}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:12px;color:var(--muted);font-size:13px}
.spinner{width:26px;height:26px;border:2px solid var(--surface3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.toast-wrap{position:fixed;top:calc(var(--safe-top) + 60px);left:50%;transform:translateX(-50%);z-index:200;pointer-events:none}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:10px 18px;font-size:13px;font-weight:500;white-space:nowrap;animation:fadeIn .2s ease}
</style>
</head>
<body>

<div id="app-root" style="display:flex;flex-direction:column;height:100%"></div>
<div class="sheet-overlay" id="sheet-overlay" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet"><div class="sheet-handle"></div><div id="sheet-content"></div></div>
</div>
<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ══════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════
let cfg         = JSON.parse(localStorage.getItem('st-cfg') || '{}');
// cfg = { apiKey, clientId, sheetId }
let currentUser = JSON.parse(sessionStorage.getItem('st-user') || 'null');
// currentUser = { username, role } role = 'admin'|'user'
let subjects    = [];
let currentTab  = 'dashboard';
let filterMode  = 'all';
let sortBy      = 'priority';
let calYear, calMonth;
let gapiReady   = false;
let gisReady    = false;
let tokenClient;

const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file';
const SUBJ_SHEET  = 'Subjects';
const USERS_SHEET = 'Users';

// ══════════════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════════════
function esc(s)     { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function safeHost(u){ try{return new URL(u).hostname;}catch{return u;} }
function daysUntil(d){ if(!d)return null; return Math.ceil((new Date(d)-new Date())/86400000); }
function fmtDate(d) { if(!d)return ''; try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch{return d;} }
function fmtShort(d){ if(!d)return ''; try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});}catch{return d;} }

// Simple hash (SHA-256 via SubtleCrypto)
async function hashPassword(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function toast(msg, type='') {
  const el = document.getElementById('toast-wrap');
  const c = type==='ok'?'var(--green2)':type==='err'?'var(--red2)':'var(--text)';
  el.innerHTML=`<div class="toast" style="color:${c}">${msg}</div>`;
  setTimeout(()=>el.innerHTML='', 2800);
}

function setSyncStatus(s) {
  const dot = document.getElementById('sync-dot');
  if(dot) dot.className = 'sync-dot '+s;
}

function statusPill(status) {
  const map = {'not started':['sp-not','○ Not started'],'in progress':['sp-prog','◑ In progress'],'finished':['sp-done','● Finished']};
  const [cls,lbl] = map[status]||map['not started'];
  return `<span class="status-pill ${cls}">${lbl}</span>`;
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

// ══════════════════════════════════════════════════════════════════════
// GOOGLE API
// ══════════════════════════════════════════════════════════════════════
function loadGoogleAPIs() {
  return new Promise(resolve => {
    const s1=document.createElement('script'); s1.src='https://apis.google.com/js/api.js';
    s1.onload=()=>{ gapi.load('client', async ()=>{
      await gapi.client.init({ apiKey:cfg.apiKey, discoveryDocs:['https://sheets.googleapis.com/$discovery/rest?version=v4'] });
      gapiReady=true; if(gisReady) resolve();
    }); };
    document.head.appendChild(s1);

    const s2=document.createElement('script'); s2.src='https://accounts.google.com/gsi/client';
    s2.onload=()=>{
      tokenClient=google.accounts.oauth2.initTokenClient({
        client_id:cfg.clientId, scope:SCOPES,
        callback: async(resp)=>{
          if(resp.error){ setSyncStatus('err'); toast('Google auth failed','err'); return; }
          setSyncStatus('syncing');
          await ensureSheets();
          showLoginScreen();
        }
      });
      gisReady=true; if(gapiReady) resolve();
    };
    document.head.appendChild(s2);
  });
}

function googleSignIn() {
  gapi.client.getToken()===null
    ? tokenClient.requestAccessToken({prompt:'consent'})
    : tokenClient.requestAccessToken({prompt:''});
}

// ══════════════════════════════════════════════════════════════════════
// SHEET BOOTSTRAP
// ══════════════════════════════════════════════════════════════════════
async function ensureSheets() {
  // If sheetId not set, create a new spreadsheet
  if (!cfg.sheetId) {
    const res = await gapi.client.sheets.spreadsheets.create({
      resource: {
        properties: {title:'Study Tracker Data'},
        sheets: [
          {properties:{title:SUBJ_SHEET}},
          {properties:{title:USERS_SHEET}}
        ]
      }
    });
    cfg.sheetId = res.result.spreadsheetId;
    localStorage.setItem('st-cfg', JSON.stringify(cfg));

    // Write headers
    await gapi.client.sheets.spreadsheets.values.batchUpdate({
      spreadsheetId: cfg.sheetId,
      resource: { valueInputOption:'RAW', data:[
        { range:`${SUBJ_SHEET}!A1`, values:[['id','userId','name','priority','startDate','examDate','progress','status','notes','links','createdAt']] },
        { range:`${USERS_SHEET}!A1`, values:[['username','passwordHash','role','createdAt']] }
      ]}
    });
    console.log('Sheet created:', cfg.sheetId);
  }
}

// USER MANAGEMENT
// ══════════════════════════════════════════════════════════════════════
async function getUsers() {
  try {
    const res = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId:cfg.sheetId, range:`${USERS_SHEET}!A2:D`
    });
    return (res.result.values||[]).filter(r=>r[0]).map(r=>({
      username: r[0]||'', passwordHash: r[1]||'', role: r[2]||'user', createdAt: r[3]||''
    }));
  } catch{ return []; }
}

async function registerUser(username, password, role='user') {
  const users = await getUsers();
  if (users.find(u=>u.username.toLowerCase()===username.toLowerCase()))
    return {ok:false, err:'Username already exists'};
  const hash = await hashPassword(password);
  await gapi.client.sheets.spreadsheets.values.append({
    spreadsheetId:cfg.sheetId, range:`${USERS_SHEET}!A2`,
    valueInputOption:'RAW', insertDataOption:'INSERT_ROWS',
    resource:{values:[[username, hash, role, new Date().toISOString()]]}
  });
  return {ok:true};
}

async function loginUser(username, password) {
  const users = await getUsers();
  const user  = users.find(u=>u.username.toLowerCase()===username.toLowerCase());
  if (!user) return {ok:false, err:'Username not found'};
  const hash = await hashPassword(password);
  if (hash !== user.passwordHash) return {ok:false, err:'Incorrect password'};
  return {ok:true, user:{username:user.username, role:user.role}};
}

// ══════════════════════════════════════════════════════════════════════
// SUBJECTS CRUD
// ══════════════════════════════════════════════════════════════════════
function rowToSubject(r) {
  while(r.length<11) r.push('');
  return {
    id:r[0]||'', userId:r[1]||'', name:r[2]||'', priority:r[3]||'medium',
    startDate:r[4]||'', examDate:r[5]||'',
    progress:parseInt(r[6])||0, status:r[7]||'not started',
    notes:r[8]||'', links:(r[9]||'').split('|').map(l=>l.trim()).filter(Boolean),
    createdAt:r[10]||''
  };
}

function subjectToRow(s) {
  return [s.id,s.userId,s.name,s.priority,s.startDate||'',s.examDate||'',
          String(s.progress||0),s.status,s.notes||'',(s.links||[]).join('|'),s.createdAt||''];
}

async function loadSubjects() {
  setSyncStatus('syncing');
  try {
    const res = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId:cfg.sheetId, range:`${SUBJ_SHEET}!A2:K`
    });
    const all = (res.result.values||[]).filter(r=>r[0]).map(rowToSubject);
    // Each user sees only their own subjects
    subjects = all.filter(s=>s.userId===currentUser.username);
    setSyncStatus('ok');
  } catch(e){ setSyncStatus('err'); toast('Failed to load','err'); }
}

async function writeAllSubjects() {
  // Read ALL subjects (all users), replace current user's rows, write back
  setSyncStatus('syncing');
  try {
    const res = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId:cfg.sheetId, range:`${SUBJ_SHEET}!A2:K`
    });
    const all = (res.result.values||[]).filter(r=>r[0]).map(rowToSubject);
    const others = all.filter(s=>s.userId!==currentUser.username);
    const combined = [...others, ...subjects];
    await gapi.client.sheets.spreadsheets.values.clear({
      spreadsheetId:cfg.sheetId, range:`${SUBJ_SHEET}!A2:K`
    });
    if(combined.length) {
      await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId:cfg.sheetId, range:`${SUBJ_SHEET}!A2`,
        valueInputOption:'RAW', resource:{values:combined.map(subjectToRow)}
      });
    }
    setSyncStatus('ok');
  } catch(e){ setSyncStatus('err'); toast('Sync failed','err'); }
}

async function appendSubject(s) {
  setSyncStatus('syncing');
  try {
    await gapi.client.sheets.spreadsheets.values.append({
      spreadsheetId:cfg.sheetId, range:`${SUBJ_SHEET}!A2`,
      valueInputOption:'RAW', insertDataOption:'INSERT_ROWS',
      resource:{values:[subjectToRow(s)]}
    });
    subjects.push(s);
    setSyncStatus('ok');
  } catch(e){ setSyncStatus('err'); toast('Sync failed','err'); }
}

function setFilter(f){ filterMode=f; renderDashboard(); }

function getFiltered() {
  let list=[...subjects];
  if(['not started','in progress','finished'].includes(filterMode)) list=list.filter(s=>s.status===filterMode);
  else if(filterMode==='high')     list=list.filter(s=>s.priority==='high');
  else if(filterMode==='medium')   list=list.filter(s=>s.priority==='medium');
  else if(filterMode==='low')      list=list.filter(s=>s.priority==='low');
  else if(filterMode==='due-soon') list=list.filter(s=>{const d=daysUntil(s.examDate);return d!==null&&d<=7&&d>=0;});
  const po={high:0,medium:1,low:2};
  if(sortBy==='priority') list.sort((a,b)=>po[a.priority]-po[b.priority]||(daysUntil(a.examDate)||9999)-(daysUntil(b.examDate)||9999));
  else if(sortBy==='progress') list.sort((a,b)=>b.progress-a.progress);
  else if(sortBy==='date') list.sort((a,b)=>(daysUntil(a.examDate)||9999)-(daysUntil(b.examDate)||9999));
  return list;
}

function renderDashboard() {
  const total=subjects.length;
  const inProg=subjects.filter(s=>s.status==='in progress').length;
  const done=subjects.filter(s=>s.status==='finished').length;
  const soon=subjects.filter(s=>{const d=daysUntil(s.examDate);return d!==null&&d<=7&&d>=0;}).length;
  const list=getFiltered();
  const chips=[['all','All'],['not started','Not started'],['in progress','In progress'],['finished','Finished'],['high','🔴 High'],['medium','🟡 Medium'],['low','🟢 Low'],['due-soon','Due soon']];
  const cardsHtml=list.length?list.map(cardHtml).join(''):`<div class="empty"><div class="empty-icon">📖</div><div class="empty-title">No subjects yet</div><div class="empty-sub">Tap + to add your first subject</div></div>`;
  document.getElementById('scroll-area').innerHTML=`
    <div class="stats-strip">
      <div class="stat" style="--ac:var(--muted)"><div class="stat-val">${total}</div><div class="stat-lbl">Total</div></div>
      <div class="stat" style="--ac:var(--blue2)"><div class="stat-val" style="color:var(--blue2)">${inProg}</div><div class="stat-lbl">Active</div></div>
      <div class="stat" style="--ac:var(--green2)"><div class="stat-val" style="color:var(--green2)">${done}</div><div class="stat-lbl">Done</div></div>
      <div class="stat" style="--ac:var(--amber)"><div class="stat-val" style="color:var(--amber)">${soon}</div><div class="stat-lbl">Soon</div></div>
    </div>
    <div class="section-header">
      <span class="section-title">Subjects</span>
      <select style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--muted);font-size:11px;font-family:'Outfit',sans-serif;outline:none" onchange="sortBy=this.value;renderDashboard()">
        <option value="priority" ${sortBy==='priority'?'selected':''}>By priority</option>
        <option value="date" ${sortBy==='date'?'selected':''}>By date</option>
        <option value="progress" ${sortBy==='progress'?'selected':''}>By progress</option>
      </select>
    </div>
    <div class="chips">${chips.map(([v,l])=>`<button class="chip ${filterMode===v?'active':''}" onclick="setFilter('${v}')">${l}</button>`).join('')}</div>
    <div class="cards">${cardsHtml}</div>`;
}

function cardHtml(s) {
  const days=daysUntil(s.examDate), pct=s.progress, complete=pct===100;
  const urgent=days!==null&&days<=3&&days>=0;
  const links=(s.links||[]).filter(l=>l.startsWith('http'));
  return `<div class="card fade-in">
    <div class="card-title">${esc(s.name)}</div>
    <div class="card-badges">
      <span class="badge badge-${s.priority}">${s.priority}</span>
      ${statusPill(s.status)}
    </div>
    <div class="date-row">
      ${s.startDate?`<span class="badge badge-start">▶ ${fmtShort(s.startDate)}</span>`:''}
      ${s.startDate&&s.examDate?`<span class="date-sep">→</span>`:''}
      ${s.examDate?`<span class="badge ${urgent?'badge-urgent':'badge-date'}">🎯 ${fmtShort(s.examDate)}${days!==null?' · '+(days===0?'Today!':days<0?Math.abs(days)+'d ago':days+'d'):''}</span>`:''}
    </div>
    ${s.notes?`<div class="card-notes">${esc(s.notes)}</div>`:''}
    ${links.length?`<div class="card-links">${links.map(l=>`<a href="${l}" class="link-chip" target="_blank">↗ ${safeHost(l)}</a>`).join('')}</div>`:''}
    <div class="prog-row">
      <span class="prog-lbl">Progress</span>
      <div class="pbar" style="flex:1"><div class="pbar-fill ${complete?'done':''}" style="width:${pct}%" id="fill-${s.id}"></div></div>
      <span class="prog-pct" id="pct-${s.id}">${pct}%</span>
    </div>
    <input type="range" min="0" max="100" value="${pct}" step="1" class="slider"
      oninput="liveProgress('${s.id}',this.value)"
      onchange="saveProgress('${s.id}',this.value)">
    <div class="card-actions">
      <button class="card-btn" onclick="openEditSheet('${s.id}')">Edit</button>
      <button class="card-btn danger" onclick="deleteSubject('${s.id}')">Delete</button>
    </div>
  </div>`;
}

function liveProgress(id,val){
  const f=document.getElementById('fill-'+id),p=document.getElementById('pct-'+id);
  if(f){f.style.width=val+'%';f.className='pbar-fill'+(parseInt(val)===100?' done':'');}
  if(p) p.textContent=val+'%';
}

async function saveProgress(id,val){
  const s=subjects.find(x=>x.id===id); if(!s) return;
  s.progress=parseInt(val);
  await writeAllSubjects(); toast('Saved','ok');
}

async function deleteSubject(id){
  if(!confirm('Delete this subject?')) return;
  subjects=subjects.filter(x=>x.id!==id);
  await writeAllSubjects(); renderDashboard(); toast('Deleted','ok');
}

    examDate:document.getElementById('f-exam').value,
    progress:parseInt(document.getElementById('f-progress').value),
    notes:document.getElementById('f-notes').value.trim(),
    links, createdAt:id?(subjects.find(x=>x.id===id)?.createdAt||new Date().toISOString()):new Date().toISOString()
  };
  closeSheet();
  if(id){ const i=subjects.findIndex(x=>x.id===id); subjects[i]=data; await writeAllSubjects(); toast('Updated','ok'); }
  else { await appendSubject(data); toast('Added','ok'); }
  renderDashboard();
}

// ══════════════════════════════════════════════════════════════════════
// CALENDAR — shows start date (green) + exam date (priority colour)
// ══════════════════════════════════════════════════════════════════════
function renderCalendar(){
  const now=new Date();
  if(!calYear) calYear=now.getFullYear();
  if(calMonth===undefined) calMonth=now.getMonth();
  const firstDay=new Date(calYear,calMonth,1);
  const totalDays=new Date(calYear,calMonth+1,0).getDate();
  const startDow=firstDay.getDay();
  const today=now.toISOString().slice(0,10);

  // Build event map for both start and exam dates
  const eventMap={};
  function addEvent(dateStr, label, cls) {
    if(!dateStr) return;
    if(!eventMap[dateStr]) eventMap[dateStr]=[];
    eventMap[dateStr].push({label,cls});
  }
  subjects.forEach(s=>{
    if(s.startDate) addEvent(s.startDate, `▶ ${s.name}`, 'start-event');
    if(s.examDate)  addEvent(s.examDate,  `🎯 ${s.name}`, `exam-${s.priority}`);
  });

  let cells='', dayCount=1;
  const totalCells=Math.ceil((startDow+totalDays)/7)*7;
  for(let i=0;i<totalCells;i++){
    let cellDate,dateStr,other=false;
    if(i<startDow){const d=new Date(calYear,calMonth,-(startDow-i-1));cellDate=d.getDate();dateStr=d.toISOString().slice(0,10);other=true;}
    else if(dayCount<=totalDays){cellDate=dayCount;dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(dayCount).padStart(2,'0')}`;dayCount++;}
    else{const d=new Date(calYear,calMonth+1,dayCount-totalDays);cellDate=d.getDate();dateStr=d.toISOString().slice(0,10);other=true;dayCount++;}
    const isToday=dateStr===today;
    const evts=(eventMap[dateStr]||[]).map(e=>`<div class="cal-evt ${e.cls}" title="${esc(e.label)}">${esc(e.label)}</div>`).join('');
    cells+=`<div class="cal-cell ${other?'other':''} ${isToday?'today':''}"><div class="cal-date">${cellDate}</div>${evts}</div>`;
  }
  const monthName=firstDay.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  document.getElementById('scroll-area').innerHTML=`
    <div class="cal-wrap">
      <div class="cal-nav">
        <button class="icon-btn" style="font-size:22px" onclick="calNav(-1)">‹</button>
        <div class="cal-month">${monthName}</div>
        <button class="icon-btn" style="font-size:22px" onclick="calNav(1)">›</button>
      </div>
      <div class="cal-grid">
        ${['S','M','T','W','T','F','S'].map(d=>`<div class="cal-day-name">${d}</div>`).join('')}
        ${cells}
      </div>
      <div style="display:flex;gap:12px;margin-top:12px;font-size:11px;color:var(--muted);flex-wrap:wrap">
        <span>▶ green = start date</span>
        <span>🎯 coloured = exam date</span>
      </div>
    </div>`;
}
function calNav(dir){calMonth+=dir;if(calMonth<0){calMonth=11;calYear--;}else if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}

// ══════════════════════════════════════════════════════════════════════
// GANTT — bars span from startDate → examDate
// ══════════════════════════════════════════════════════════════════════
function renderGantt(){
  const withDates=subjects.filter(s=>s.examDate||s.startDate);
  if(!withDates.length){
    document.getElementById('scroll-area').innerHTML=`<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">No dates set</div><div class="empty-sub">Add start or exam dates to see the Gantt chart</div></div>`;
    return;
  }
  const today=new Date(); today.setHours(0,0,0,0);
  const allDates=[];
  withDates.forEach(s=>{
    if(s.startDate) allDates.push(new Date(s.startDate));
    if(s.examDate)  allDates.push(new Date(s.examDate));
  });
  const minDate=new Date(Math.min(...allDates,today));
  minDate.setDate(minDate.getDate()-2);
  const maxDate=new Date(Math.max(...allDates));
  maxDate.setDate(maxDate.getDate()+5);
  const totalDays=Math.ceil((maxDate-minDate)/86400000);

  // Ruler labels
  const step=totalDays<=30?5:totalDays<=60?10:totalDays<=120?14:21;
  let rulerHtml='';
  for(let i=0;i<=totalDays;i+=step){
    const d=new Date(minDate); d.setDate(d.getDate()+i);
    const pct=(i/totalDays*100).toFixed(1);
    rulerHtml+=`<div class="gantt-ruler-lbl" style="left:${pct}%">${fmtShort(d.toISOString().slice(0,10))}</div>`;
  }

  // Today line position
  const todayPct=Math.max(0,Math.min(100,((today-minDate)/86400000)/totalDays*100));

  const rows=withDates.map(s=>{
    const start=s.startDate?new Date(s.startDate):today;
    const end  =s.examDate ?new Date(s.examDate) :start;
    start.setHours(0,0,0,0); end.setHours(0,0,0,0);
    const barLeft=Math.max(0,((start-minDate)/86400000)/totalDays*100);
    const barRight=Math.min(100,((end-minDate)/86400000)/totalDays*100);
    const barW=Math.max(barRight-barLeft,0.5);
    // Progress fill within the bar
    const progW=barW*(s.progress/100);
    const dLeft=daysUntil(s.examDate);
    const st={'not started':'○','in progress':'◑','finished':'●'}[s.status]||'○';
    return `<div class="gantt-row">
      <div class="gantt-lbl">
        <div class="gantt-lbl-name">${st} ${esc(s.name)}</div>
        <div class="gantt-lbl-sub">${s.startDate?fmtShort(s.startDate):'?'} → ${s.examDate?fmtShort(s.examDate):'?'} · ${s.progress}%</div>
      </div>
      <div class="gantt-track">
        <div class="gantt-bg ${s.priority}" style="left:${barLeft.toFixed(1)}%;width:${barW.toFixed(1)}%"></div>
        <div class="gantt-fill ${s.priority}" style="left:${barLeft.toFixed(1)}%;width:${progW.toFixed(1)}%">${s.progress>12?s.progress+'%':''}</div>
        <div class="gantt-today" style="left:${todayPct.toFixed(1)}%"></div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('scroll-area').innerHTML=`
    <div class="gantt-wrap">
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Start date → Exam date · filled = progress · line = today</div>
      <div class="gantt-ruler" style="height:20px;margin-bottom:6px">${rulerHtml}</div>
      ${rows}
      <div style="display:flex;gap:14px;margin-top:14px;font-size:11px;color:var(--muted);flex-wrap:wrap">
        <span>🔴 High · 🟡 Medium · 🟢 Low</span>
        <span>○ Not started · ◑ In progress · ● Finished</span>
      </div>
    </div>`;
}

// INIT
// ══════════════════════════════════════════════════════════════════════
async function initApp(){
  if(!cfg.apiKey||!cfg.clientId){ showSetupScreen(); return; }

  render(`<div class="loading" style="height:100vh"><div class="spinner"></div>Connecting to Google...</div>`);

  await loadGoogleAPIs();

  // Check if we already have a token
  if(gapi.client.getToken()){
    await ensureSheets();
    if(currentUser){ await loadSubjects(); showAppScreen(); }
    else showLoginScreen();
  } else {
    googleSignIn();
  }
}

initApp();
</script>
